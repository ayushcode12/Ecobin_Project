spring.application.name=EcoBin_Backend
server.port=${PORT:8082}

# Database Configuration (Injected via Render/Supabase)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecobin_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:new_password}
spring.database.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Security & JWT
security.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
security.jwt.expiration=86400000

# File Upload & Server Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB

# AI Model Connectivity
ecobin.ai.base-url=${AI_MODEL_URL:http://localhost:5000}
ecobin.ai.auto-start=${AI_AUTO_START:false}
ecobin.ai.python-command=python
ecobin.ai.model-workdir=../Model
ecobin.ai.startup-timeout-ms=30000
