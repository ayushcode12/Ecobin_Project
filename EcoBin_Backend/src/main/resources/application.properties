spring.application.name=EcoBin_Backend
server.port=${PORT:8080}

# Database Configuration (Injected via Render/Supabase)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.database.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Security & JWT
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration=86400000

# File Upload & Server Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB

# AI Model Connectivity
ecobin.ai.base-url=${AI_MODEL_URL}
ecobin.ai.auto-start=${AI_AUTO_START:false}
ecobin.ai.python-command=python
ecobin.ai.model-workdir=../Model
ecobin.ai.startup-timeout-ms=30000
